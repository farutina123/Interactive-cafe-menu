<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кафе «Уютное» — Меню</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>

  <!-- ===== ШАПКА САЙТА ===== -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🍽️</span>
        <span class="logo-text">Кафе «Уютное»</span>
      </div>

      <!-- Кнопка корзины с бейджем количества -->
      <button class="cart-btn" id="cart-btn">
        <span class="cart-icon">🛒</span>
        <span class="cart-label">Корзина</span>
        <!-- Бейдж скрыт если корзина пуста, показывается через JS -->
        <span class="cart-count" id="cart-count" style="display: none;">0</span>
      </button>
    </div>
  </header>

  <!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
  <main class="main">

    <!-- Навигация по категориям — кнопки генерируются в script.js -->
    <nav class="categories-nav" id="categories-nav"></nav>

    <!-- Сортировка по цене -->
    <div class="sort-bar" style="margin: 0 0 16px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
      <span style="font-size: 0.9rem; color: var(--text-muted, #666);">Сортировка:</span>
      <button class="sort-btn sort-btn--active" data-sort="default">По умолчанию</button>
      <button class="sort-btn" data-sort="asc">↑ Дешевле</button>
      <button class="sort-btn" data-sort="desc">↓ Дороже</button>
    </div>

    <!-- Сетка карточек блюд — карточки генерируются в script.js -->
    <section class="dishes-grid" id="dishes-grid"></section>

  </main>

  <!-- ===== МОДАЛЬНОЕ ОКНО КОРЗИНЫ ===== -->
  <!-- Фон затемняется при открытии, клик по нему закрывает корзину -->
  <div class="cart-modal" id="cart-modal">
    <div class="cart-panel">

      <div class="cart-header">
        <h2 class="cart-title">🛒 Ваша корзина</h2>
        <button class="close-btn" id="close-cart-btn">✕</button>
      </div>

      <!-- Список товаров — заполняется через JS -->
      <div class="cart-items-list" id="cart-items-list">
        <p class="cart-empty">Корзина пуста. Добавьте блюда из меню!</p>
      </div>

      <!-- Итоговая сумма, чаевые и кнопка заказа -->
      <div class="cart-footer">
        <div class="cart-tips" id="cart-tips-container">
          <p class="tips-title">Оставить чаевые официанту?</p>
          <div class="tips-options">
            <button class="tip-btn" data-percent="0">0%</button>
            <button class="tip-btn" data-percent="5">5%</button>
            <button class="tip-btn" data-percent="10">10%</button>
            <button class="tip-btn" data-percent="15">15%</button>
          </div>
        </div>
        <div class="cart-total">
          <span>Сумма заказа:</span>
          <span><span id="cart-subtotal-price">0</span> ₽</span>
        </div>
        <div class="cart-total">
          <span>Чаевые:</span>
          <span><span id="cart-tips-amount">0</span> ₽</span>
        </div>
        <div class="cart-total main-total">
          <span>Итого:</span>
          <span class="cart-total-price"><span id="cart-total-price">0</span> ₽</span>
        </div>
        <button class="order-btn" id="order-btn">Оформить заказ</button>
      </div>

    </div>
  </div>

  <!-- Подключаем скрипт в конце — после загрузки HTML -->
  <script src="script.js?v=2"></script>

</body>
</html>
